# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-hon"
BBFILE_PATTERN_meta-hon = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-hon = "6"

LAYERDEPENDS_meta-hon = "core"
LAYERSERIES_COMPAT_meta-hon = "scarthgap"
